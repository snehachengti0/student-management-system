{% extends "base.html" %}
{% block title %}Login | Student MS{% endblock %}

{% block auth_content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="brand-mark large">SMS</div>
            <h1>Student Management System</h1>
            <p>Sign in to continue</p>
        </div>

        <form method="POST" class="form">
            <div class="role-toggle">
                <label><input type="radio" name="role" value="student" checked> Student</label>
                <label><input type="radio" name="role" value="admin"> Admin</label>
            </div>

            <label>Username / Email / Roll No.
                <input type="text" name="identifier" required autofocus>
            </label>

            <label>Password
                <input type="password" name="password" required>
            </label>

            <button class="btn primary" type="submit">Login</button>
        </form>

        <p class="auth-foot">
            New student? <a href="{{ url_for('register') }}">Register here</a>
        </p>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Register | Student MS{% endblock %}

{% block auth_content %}
<div class="auth-wrap">
    <div class="auth-card wide">
        <div class="auth-brand">
            <div class="brand-mark large">SMS</div>
            <h1>Student Registration</h1>
            <p>Create your student account</p>
        </div>

        <form method="POST" class="form grid-2">
            <label>Roll Number
                <input type="text" name="roll_no" required>
            </label>
            <label>Full Name
                <input type="text" name="name" required>
            </label>
            <label>Email
                <input type="email" name="email" required>
            </label>
            <label>Phone
                <input type="text" name="phone">
            </label>
            <label>Course
                <input type="text" name="course" placeholder="e.g. B.Tech CSE">
            </label>
            <label>Year of Study
                <input type="number" name="year_of_study" min="1" max="6" value="1">
            </label>
            <label class="full">Address
                <input type="text" name="address">
            </label>
            <label class="full">Password
                <input type="password" name="password" required minlength="6">
            </label>

            <div class="full row-end">
                <a class="btn ghost" href="{{ url_for('login') }}">Back to Login</a>
                <button class="btn primary" type="submit">Register</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
